name: Host2Play 续期

on:
  schedule:
    - cron: '0 0,11,22 * * *'
    - cron: '30 5,16 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    name: 执行脚本
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper 'requests[socks]' SpeechRecognition pydub

      - name: 启用 WARP 网络（兜底用）
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] DNS 测试:"
          nslookup host2play.gratis 1.1.1.1 || echo "[WARN] 解析失败"

      - name: 安装 sing-box
        run: |
          wget -q -O /tmp/sing-box.deb https://github.com/SagerNet/sing-box/releases/download/v1.13.14/sing-box_1.13.14_linux_amd64.deb
          sudo dpkg -i /tmp/sing-box.deb
          sing-box version

      - name: 安装 xray-core
        run: |
          sudo mkdir -p /usr/local/lib/xray
          sudo wget -q https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip -O /tmp/xray.zip
          sudo unzip -q /tmp/xray.zip -d /usr/local/lib/xray/
          sudo chmod +x /usr/local/lib/xray/xray
          sudo ln -sf /usr/local/lib/xray/xray /usr/local/bin/xray
          xray version

      - name: 执行续订
        env:
          host2: ${{ secrets.host2 }}
          SUB_URL: ${{ secrets.SUB_URL }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
